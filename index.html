<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🇸🇬 싱가포르 여행</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F6F1E9;
  --ink: #1A1510;
  --muted: #7A7068;
  --border: #DDD6CC;
  --bg: #FDFAF5;
  --hotel: #1D9E75; --food: #7F77DD; --cafe: #BA7517;
  --sight: #378ADD; --shop: #D4537E; --bar: #26215C;
  --must: #E24B4A;  --local: #4A8C3F; --kr: #B03030;
  --radius: 16px;
  --peek: 196px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; background: #d4cfc6; color: var(--ink); }

/* ════════════════════════ DESKTOP ════════════════════════ */
@media (min-width: 700px) {
  body { display: flex; }
  #map-area { flex: 1; position: relative; height: 100vh; }
  #sheet {
    width: 390px; min-width: 320px;
    height: 100vh; border-radius: 0;
    border-left: 1.5px solid var(--border);
    position: relative; transform: none !important;
    display: flex; flex-direction: column;
    box-shadow: none; background: var(--bg);
  }
  #sheet-handle, #map-fab { display: none; }
  #place-list { flex: 1; overflow-y: auto; }
}

/* ════════════════════════ MOBILE ════════════════════════ */
@media (max-width: 699px) {
  body { display: block; position: relative; }
  #map-area { position: fixed; inset: 0; z-index: 0; }
  #sheet {
    position: fixed; bottom: 0; left: 0; right: 0;
    /* 시트 최대 높이: 화면 전체 */
    height: 100vh;
    border-radius: var(--radius) var(--radius) 0 0;
    z-index: 10;
    /* 기본(peek): 상단 196px만 보이게 */
    transform: translateY(calc(100vh - var(--peek)));
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    will-change: transform;
  }
  #sheet.s-mid  { transform: translateY(45vh); }
  #sheet.s-full { transform: translateY(0); }
  /* place-list: 시트 내 남은 공간을 모두 쓰되 넘치면 스크롤 */
  #place-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    /* 시트가 full일 때도 목록이 하단까지 보이도록 여유 패딩 */
    padding-bottom: env(safe-area-inset-bottom, 24px);
  }
  #map-fab {
    position: fixed; z-index: 11;
    right: 14px; bottom: calc(var(--peek) + 12px);
    background: var(--ink); color: var(--cream);
    border: none; border-radius: 28px;
    padding: 9px 14px; font-size: 12px; font-weight: 600;
    display: flex; align-items: center; gap: 5px;
    box-shadow: 0 3px 14px rgba(0,0,0,.25); cursor: pointer;
    transition: bottom .3s cubic-bezier(.4,0,.2,1);
  }
  /* 드래그 가능 영역을 핸들+헤더+탭까지 확장 */
  #drag-zone { touch-action: none; cursor: grab; }
}

/* ── MAP AREA ── */
#map-area { background: #ccc8bf; display: flex; align-items: center; justify-content: center; }
#map-iframe { width: 100%; height: 100%; border: none; display: none; }
#map-empty { text-align: center; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
#map-empty .icon { font-size: 52px; }
#map-empty h2 { font-family: 'Nanum Myeongjo', serif; font-size: 19px; font-weight: 800; }
#map-empty p { font-size: 12px; color: var(--muted); line-height: 1.75; max-width: 260px; }
.btn-primary {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 18px; background: var(--ink); color: var(--cream);
  border-radius: 24px; font-size: 13px; font-weight: 600;
  text-decoration: none; border: none; cursor: pointer;
}

/* ── SHEET ── */
#sheet {
  background: var(--bg);
  display: flex; flex-direction: column;
  box-shadow: 0 -4px 28px rgba(0,0,0,.13);
  overflow: hidden;
}
#sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border); margin: 10px auto 0;
  flex-shrink: 0; cursor: grab; touch-action: none;
}
#sheet-header { padding: 10px 16px 2px; flex-shrink: 0; }
#sheet-header h1 { font-family: 'Nanum Myeongjo', serif; font-size: 15px; font-weight: 800; }
#sheet-header p  { font-size: 10.5px; color: var(--muted); margin-top: 1px; }

/* Day tabs */
#day-tabs {
  display: flex; overflow-x: auto; scrollbar-width: none;
  padding: 8px 16px 0; gap: 6px; flex-shrink: 0;
}
#day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0; padding: 5px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 500; color: var(--muted);
  background: var(--cream); border: 1px solid var(--border);
  cursor: pointer; white-space: nowrap;
  display: flex; flex-direction: column; align-items: center; line-height: 1.3;
  transition: all .15s;
}
.day-tab span { font-size: 9.5px; }
.day-tab.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }
.day-tab.active span { color: #A89E8C; }

/* Route link */
#route-row {
  padding: 7px 16px 3px; flex-shrink: 0;
}
#route-link {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 500; color: var(--muted);
  text-decoration: none; padding: 4px 10px 4px 8px;
  border: 1px solid var(--border); border-radius: 12px;
  background: var(--cream);
}
.divider { height: 1px; background: var(--border); margin: 6px 0 0; flex-shrink: 0; }

/* Place list */
#place-list { padding: 2px 0 32px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.day-section {
  padding: 10px 16px 3px; font-size: 10px; font-weight: 700;
  color: var(--muted); letter-spacing: .7px; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.day-section::after { content:''; flex:1; height:1px; background:var(--border); }
.pi {
  display: grid; grid-template-columns: 46px 9px 1fr;
  gap: 0 10px; padding: 7px 16px;
  cursor: pointer; transition: background .12s; align-items: start;
}
.pi:active, .pi.active { background: rgba(26,21,16,.06); }
.pi-time {
  font-size: 10px; color: var(--muted); text-align: right;
  padding-top: 3px; font-variant-numeric: tabular-nums; font-weight: 500;
}
.pi-line { display:flex; flex-direction:column; align-items:center; padding-top:4px; }
.pi-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.pi-conn { width:1.5px; flex:1; min-height:16px; background:var(--border); margin-top:3px; }
.pi.last-day .pi-conn { display:none; }
.pi-body { padding-bottom: 5px; }
.pi-name { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.35; }
.pi-desc { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
.pi-tags { display:flex; flex-wrap:wrap; gap:3px; margin-top:5px; }
.tag { font-size: 9.5px; padding: 1.5px 6px; border-radius: 20px; font-weight: 600; }
.tag-hotel { background:#E1F5EE; color:#0F6E56; }
.tag-food  { background:#EEEDFE; color:#3C3489; }
.tag-cafe  { background:#FAEEDA; color:#633806; }
.tag-sight { background:#E6F1FB; color:#0C447C; }
.tag-shop  { background:#FBEAF0; color:#72243E; }
.tag-bar   { background:#E8E6F4; color:#26215C; }
.tag-must  { background:#F7C1C1; color:#501313; }
.tag-local { background:#EAF3DE; color:#27500A; }
.tag-kr    { background:#FCEBEC; color:#791F1F; }
.pi-map {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10.5px; font-weight: 500; color: #1a73e8;
  text-decoration: none; margin-top: 6px;
  padding: 3px 9px 3px 7px;
  background: #EAF2FF; border: 1px solid #cce0f5; border-radius: 14px;
}

/* ════ DETAIL MODAL ════ */
#overlay {
  display: none; position: fixed; inset: 0; z-index: 30;
  background: rgba(0,0,0,.38); align-items: flex-end; justify-content: center;
}
#overlay.open { display: flex; }
#detail {
  background: var(--bg); width: 100%; max-width: 560px;
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 20px 20px 36px; position: relative;
  animation: su .26s cubic-bezier(.4,0,.2,1);
}
@keyframes su { from{transform:translateY(50px);opacity:0} to{transform:translateY(0);opacity:1} }
.d-close {
  position: absolute; top: 14px; right: 14px;
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--cream); border: 1px solid var(--border);
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; color: var(--muted);
}
#d-day  { font-size: 10px; color: var(--muted); margin-bottom: 3px; font-weight: 500; }
#d-name { font-family: 'Nanum Myeongjo', serif; font-size: 19px; font-weight: 800; margin-bottom: 6px; line-height: 1.3; }
#d-desc { font-size: 12.5px; color: var(--muted); line-height: 1.7; margin-bottom: 10px; }
#d-tags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:14px; }
#d-map  {
  width: 100%; height: 190px; border-radius: 10px;
  overflow: hidden; border: 1px solid var(--border); margin-bottom: 12px; background: #ddd;
}
#d-map iframe { width:100%; height:100%; border:none; }
.d-btns { display:flex; gap:8px; }
.d-btn {
  flex:1; padding: 11px; border-radius: 10px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 600; text-decoration: none;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: opacity .13s;
}
.d-btn:active { opacity: .8; }
.d-btn.fill { background: var(--ink); color: var(--cream); }
.d-btn.line { background: var(--cream); color: var(--ink); border: 1.5px solid var(--border); }

@media (min-width: 700px) {
  #overlay.open { align-items: center; }
  #detail { border-radius: var(--radius); max-width: 440px; margin: 0 20px; }
  #d-map  { height: 220px; }
}
</style>
</head>
<body>

<!-- MAP -->
<div id="map-area">
  <iframe id="map-iframe"></iframe>
  <div id="map-empty">
    <div class="icon">🗺️</div>
    <h2>싱가포르 여행 지도</h2>
    <p>아래 목록에서 장소를 탭하면<br>지도가 열려요</p>
    <button class="btn-primary" onclick="openRoute()">📍 오늘 경로 보기</button>
  </div>
</div>

<!-- Mobile FAB -->
<button id="map-fab" onclick="openRoute()">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
  경로 보기
</button>

<!-- BOTTOM SHEET -->
<div id="sheet">
  <div id="drag-zone">
    <div id="sheet-handle"></div>
    <div id="sheet-header">
      <h1>🇸🇬 싱가포르 4박5일</h1>
      <p>5/1(목) ~ 5/5(월) · Amara Hotel 베이스</p>
    </div>
    <div id="day-tabs">
      <button class="day-tab active" onclick="showDay(1,this)">Day 1<span>5/1 목</span></button>
      <button class="day-tab" onclick="showDay(2,this)">Day 2<span>5/2 금</span></button>
      <button class="day-tab" onclick="showDay(3,this)">Day 3<span>5/3 토</span></button>
      <button class="day-tab" onclick="showDay(4,this)">Day 4<span>5/4 일</span></button>
      <button class="day-tab" onclick="showDay(5,this)">Day 5<span>5/5 월</span></button>
      <button class="day-tab" onclick="showDay(0,this)">전체<span>ALL</span></button>
    </div>
  </div>
  <div id="route-row">
    <a id="route-link" href="#" target="_blank">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span id="route-label">Day 1 전체 경로 Google Maps</span>
    </a>
  </div>
  <div class="divider"></div>
  <div id="place-list"></div>
</div>

<!-- DETAIL MODAL -->
<div id="overlay" onclick="closeDetail(event)">
  <div id="detail">
    <button class="d-close" onclick="closeDetail()">✕</button>
    <div id="d-day"></div>
    <div id="d-name"></div>
    <div id="d-desc"></div>
    <div id="d-tags"></div>
    <div id="d-map"><iframe id="d-iframe"></iframe></div>
    <div class="d-btns">
      <a id="d-gmaps" class="d-btn fill" href="#" target="_blank">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Google Maps에서 열기
      </a>
      <button class="d-btn line" onclick="closeDetail()">닫기</button>
    </div>
  </div>
</div>

  {day:5,time:'12:00',name:'The Coconut Club',desc:'나시르막+렌당+첸돌 / River Valley New Bahru / S$25~40',tags:['food','local'],dot:'#7F77DD',q:'The Coconut Club River Valley Road Singapore'},
  {day:5,time:'14:00',name:'ION Orchard + ION Sky 55층',desc:'55층 무료 전망대 / Level 4 안내데스크 접수',tags:['shop','sight'],dot:'#D4537E',q:'ION Orchard Singapore'},
  {day:5,time:'15:30',name:'Bacha Coffee ION Orchard ☕',desc:'모로코 1920년대 감성 / 싱글오리진 드립+커피젤리 / S$20~35',tags:['cafe'],dot:'#BA7517',q:'Bacha Coffee ION Orchard Singapore'},

  {day:5,time:'22:00',name:'✈️ 인천행 출발',desc:'안전한 귀환! 수고하셨습니다 🎉',tags:['hotel'],dot:'#1D9E75',q:'Changi Airport Singapore'},
];

const TL = {hotel:'호텔',food:'식사',cafe:'카페',sight:'관광',shop:'쇼핑',bar:'야경바',must:'필수',local:'현지',kr:'한국인검증'};
const DN = ['','5/1 목','5/2 금','5/3 토','5/4 일','5/5 월'];
let curDay = 1;

function gp(d) { return d===0 ? PLACES : PLACES.filter(p=>p.day===d); }

function renderList(d) {
  const list = document.getElementById('place-list');
  const ps = gp(d);
  let h = '', ld = null;
  ps.forEach((p,i) => {
    if (d===0 && p.day!==ld) { ld=p.day; h+=`<div class="day-section">Day ${p.day} · ${DN[p.day]}</div>`; }
    const tags = p.tags.map(t=>`<span class="tag tag-${t}">${TL[t]||t}</span>`).join('');
    const mu = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.q)}`;
    const isLast = (i===ps.length-1)||(d===0&&ps[i+1]&&ps[i+1].day!==p.day);
    h+=`<div class="pi${isLast?' last-day':''}" id="pi${i}" onclick="openDetail(${i})">
      <span class="pi-time">${p.time}</span>
      <div class="pi-line"><div class="pi-dot" style="background:${p.dot}"></div><div class="pi-conn"></div></div>
      <div class="pi-body">
        <div class="pi-name">${p.name}</div>
        <div class="pi-desc">${p.desc}</div>
        <div class="pi-tags">${tags}</div>
        <a class="pi-map" href="${mu}" target="_blank" onclick="event.stopPropagation()">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>지도 보기
        </a>
      </div>
    </div>`;
  });
  list.innerHTML = h;
}

function setRouteLink(d) {
  const ps = gp(d);
  const url = `https://www.google.com/maps/dir/${ps.map(p=>encodeURIComponent(p.q)).join('/')}`;
  document.getElementById('route-link').href = url;
  document.getElementById('route-label').textContent = d===0 ? '전체 주요 장소 경로 보기' : `Day ${d} 전체 경로 Google Maps`;
}

function showDay(d, btn) {
  curDay = d;
  document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderList(d); setRouteLink(d);
  // mobile: bump to mid
  const s = document.getElementById('sheet');
  if (window.innerWidth < 700) { s.classList.remove('s-full'); s.classList.add('s-mid'); moveFab('mid'); }
  resetMap();
}

function resetMap() {
  document.getElementById('map-iframe').style.display='none';
  document.getElementById('map-empty').style.display='flex';
}

function openDetail(i) {
  const ps = gp(curDay);
  const p = ps[i];
  if (!p) return;
  const mu = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.q)}`;
  const eu = `https://maps.google.com/maps?q=${encodeURIComponent(p.q)}&output=embed&z=16`;
  document.getElementById('d-day').textContent  = `Day ${p.day} · ${p.time} · ${DN[p.day]}`;
  document.getElementById('d-name').textContent = p.name;
  document.getElementById('d-desc').textContent = p.desc;
  document.getElementById('d-tags').innerHTML   = p.tags.map(t=>`<span class="tag tag-${t}">${TL[t]||t}</span>`).join('');
  document.getElementById('d-gmaps').href       = mu;
  document.getElementById('d-iframe').src       = eu;
  document.getElementById('overlay').classList.add('open');
  // update bg map (desktop)
  const fr = document.getElementById('map-iframe');
  fr.src=eu; fr.style.display='block';
  document.getElementById('map-empty').style.display='none';
  document.querySelectorAll('.pi').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById(`pi${i}`); if(el) el.classList.add('active');
}

function closeDetail(e) {
  if (e && e.target!==document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
}

function openRoute() {
  const ps = gp(curDay);
  window.open(`https://www.google.com/maps/dir/${ps.map(p=>encodeURIComponent(p.q)).join('/')}`,'_blank');
}

// ── BOTTOM SHEET DRAG ──
(function(){
  if (window.innerWidth >= 700) return;
  const sheet   = document.getElementById('sheet');
  const dzone   = document.getElementById('drag-zone');
  const list    = document.getElementById('place-list');

  let sy=0, st=0, drag=false;
  const VH = () => window.innerHeight;

  // 현재 translateY 값 읽기
  function getTY() {
    const m = new DOMMatrix(window.getComputedStyle(sheet).transform);
    return m.m42;
  }

  // 스냅 위치로 이동
  function snap(s) {
    sheet.style.transition = 'transform .3s cubic-bezier(.4,0,.2,1)';
    sheet.style.transform  = '';          // CSS class가 담당
    sheet.classList.remove('s-mid','s-full');
    if      (s === 'full') sheet.classList.add('s-full');
    else if (s === 'mid')  sheet.classList.add('s-mid');
    // else: peek (transform은 CSS default)
    moveFab(s);
    // 스크롤 잠금: peek/mid 상태에서 list 스크롤 막아 드래그 우선
    list.style.overflowY = (s === 'full') ? 'auto' : 'hidden';
  }

  // 드래그 시작: drag-zone 전체에서 받음
  dzone.addEventListener('touchstart', e => {
    drag = true;
    sy   = e.touches[0].clientY;
    st   = getTY();
    sheet.style.transition = 'none';
  }, { passive: true });

  // full 상태에서 list 최상단이면 위로 끌어당겨 닫을 수 있게
  list.addEventListener('touchstart', e => {
    if (list.scrollTop === 0) {
      drag = true;
      sy   = e.touches[0].clientY;
      st   = getTY();
      sheet.style.transition = 'none';
    }
  }, { passive: true });

  window.addEventListener('touchmove', e => {
    if (!drag) return;
    const dy = e.touches[0].clientY - sy;
    let ny = st + dy;
    ny = Math.max(0, Math.min(ny, VH() * 0.88));  // 최대 88% 아래로만
    sheet.style.transform = `translateY(${ny}px)`;
  }, { passive: true });

  window.addEventListener('touchend', () => {
    if (!drag) return;
    drag = false;
    const cur = getTY();
    const h   = VH();
    if      (cur < h * 0.18)  snap('full');
    else if (cur < h * 0.60)  snap('mid');
    else                       snap('peek');
  });

  snap('peek');
})();

function moveFab(state) {
  const fab = document.getElementById('map-fab');
  if (!fab) return;
  if      (state === 'peek') fab.style.bottom = 'calc(var(--peek) + 12px)';
  else if (state === 'mid')  fab.style.bottom = '58vh';
  else                       fab.style.bottom = 'calc(100vh + 8px)'; // full일 땐 숨김
}

renderList(1); setRouteLink(1);
</script>
